<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout/memberLayout}"
>

<th:block layout:fragment="title">
    <title>회원 수정페이지</title>
</th:block>
<th:block layout:fragment="javascript">
    <!-- index.html만 적용되는 javascript 설정 -->
</th:block>
<th:block  layout:fragment="css">
    <link rel="stylesheet" th:href="@{/css/member/update.css}">
</th:block>
<th:block layout:fragment="container">
<div class="update">
    <div class="update-con">
        <form th:action="@{/member/update}" method="post">
            <input type="hidden" name="id" th:value="${member.id}">
            <ul>
                <li>
                    <label for="userEmail">이메일</label>
                    <input type="text" name="userEmail" id="userEmail" th:value="${member.userEmail}" readonly>
                </li>
                <li>
                    <label for="userPw">비밀번호</label>
                    <input type="password" name="userPw" id="userPw" th:value="${member.userPw}">

                </li>
                <li>
                    <label for="userName">이름</label>
                    <input type="text" name="userName" id="userName" th:value="${member.userName}">

                </li>
                <li>
                    <label for="phone">전화번호</label>
                    <input type="text" name="phone" id="phone" th:value="${member.phone}">

                </li>
                <li>
                    <label for="addr">주소</label>
                    <input type="text" name="addr" id="addr" th:value="${member.addr}">
                </li>
                <li th:text="${#temporals.format(member.createTime,'yyyy년MM월dd일 HH시mm분ss초')}"></li>
                <li th:text="${#temporals.format(member.updateTime,'yyyy.MM.dd일 HH.mm')}"></li>
                <li>
                    <input type="submit" value="수정하기">
                </li>
            </ul>
        </form>
    </div>
</div>
</th:block>
</html>
