<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout/memberLayout}"
>

<th:block layout:fragment="title">
    <title>회원목록페이지</title>
</th:block>
<th:block layout:fragment="javascript">
    <!-- index.html만 적용되는 javascript 설정 -->
</th:block>
<th:block  layout:fragment="css">
    <link rel="stylesheet" th:href="@{/css/member/memberList.css}">
</th:block>
<th:block layout:fragment="container">
    <div class="memberList">
        <div class="memberList-con">
            <table>
                <tr>
                    <th>아이디</th>
                    <th>userEmail</th>
                    <th>userPw</th>
                    <th>userName</th>
                    <th>phone</th>
                    <th>addr</th>
                    <th>role</th>
                    <th>createTime</th>
                    <th>updateTime</th>
                    <th>보기</th>
                </tr>
                <tr th:each="member:${memberList}">
                    <td th:text="${member.id}"></td>
                    <td th:text="${member.userEmail}"></td>
                    <td th:text="${member.userPw}"></td>
                    <td th:text="${member.userName}"></td>
                    <td th:text="${member.phone}"></td>
                    <td th:text="${member.addr}"></td>
                    <td th:text="${member.role}"></td>
                    <td th:text="${member.createTime}"></td>
                    <td th:text="${member.updateTime}"></td>
                    <td><a th:href="@{/member/detail/{id}(id=${member.id})}">상세보기</a></td> <!--요즘엔 이걸 많이 사용-->
<!--                    <td><a th:href="@{/member/detail(id=${member.id})}">상세보기</a></td>-->

                </tr>
            </table>
        </div>
    </div>
</th:block>
</html>
